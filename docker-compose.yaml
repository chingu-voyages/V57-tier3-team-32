services:
  fe-pr-review:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    container_name: fe-pr-review
    ports:
      - "3000:8080"
    env_file:
      - ./apps/client/.env
    depends_on:
      - be-pr-review
    networks:
      - pr-review-network
    restart: unless-stopped

  be-pr-review:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: be-pr-review
    ports:
      - "3000:3000"
    env_file:
      - ./apps/server/.env
    networks:
      - pr-review-network
    restart: unless-stopped

networks:
  pr-review-network:
    driver: bridge
