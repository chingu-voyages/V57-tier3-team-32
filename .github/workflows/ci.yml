name: CI Workflow

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.19"

      - name: Install dependencies
        run: npm ci

      - name: Run lint on client
        run: npm run client:lint

      - name: Run lint on server
        run: npm run server:lint

      - name: Format check
        run: npm run all:format

      - name: Test
        run: npm run server:test
